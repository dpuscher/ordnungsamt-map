x-container-timezone: &container-timezone
  TZ: ${TZ:-Europe/Berlin}

services:
  postgres:
    platform: ${POSTGIS_PLATFORM:-linux/amd64}
    image: ${POSTGIS_IMAGE:-postgis/postgis:18-3.6}
    command: postgres -c timezone=${TZ:-Europe/Berlin}
    environment:
      <<: *container-timezone
      POSTGRES_DB: ${POSTGRES_DB:-ordnungsamt}
      POSTGRES_USER: ${POSTGRES_USER:-ordnungsamt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ordnungsamt}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ordnungsamt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    environment:
      <<: *container-timezone
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *container-timezone
      DATABASE_URL: ${DATABASE_URL:-postgresql://ordnungsamt:ordnungsamt@postgres:5432/ordnungsamt}
      COLLECTOR_INTERVAL_MINUTES: ${COLLECTOR_INTERVAL_MINUTES:-15}
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      <<: *container-timezone
      DATABASE_URL: ${DATABASE_URL:-postgresql://ordnungsamt:ordnungsamt@postgres:5432/ordnungsamt}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 4000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      <<: *container-timezone
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
