services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    command:
      - sh
      - -lc
      - |
        set -e
        yarn workspace @ordnungsamt/shared build
        yarn workspace @ordnungsamt/backend build
        yarn workspace @ordnungsamt/shared dev &
        yarn workspace @ordnungsamt/backend dev &
        yarn workspace @ordnungsamt/backend dev:start
    environment:
      TZ: ${TZ:-Europe/Berlin}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ordnungsamt:ordnungsamt@postgres:5432/ordnungsamt}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 4000
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    command:
      - sh
      - -lc
      - |
        set -e
        yarn workspace @ordnungsamt/shared build
        yarn workspace @ordnungsamt/shared dev &
        yarn workspace @ordnungsamt/frontend dev --host 0.0.0.0 --port 3000
    environment:
      TZ: ${TZ:-Europe/Berlin}
      API_PROXY_TARGET: http://backend:4000
      VITE_API_URL: ""
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_node_modules:
  frontend_node_modules:
